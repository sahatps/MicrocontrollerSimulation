<head>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<header class="hackCable-header">
    <button class="hackCable-toggle-catalog" title="Show/Hide components">
        <span class="toggle-icon">⊞</span>
        <span class="toggle-label">Components</span>
    </button>
</header>
<div class="hackCable-catalog-bar">
    <div class="hackCable-catalog-bar-inner">
        <div class="hackCable-catalog-actions">
            <select class="hackCable-catalog-sorter"></select>
        </div>
        <div class="hackCable-catalog-list"></div>
    </div>
</div>
<div class="hackCable-content-wrapper">
    <div class="hackCable-editor">
        <div id="hackCable-canvas" class="hackCable-canvas">
            <div class="hackCable-canvas-overlay-container"></div>
        </div>
    </div>
</div>
